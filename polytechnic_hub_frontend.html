<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Polytechnic Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
            background-color: #f3f4f6;
            overflow: hidden;
        }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .screen {
            display: none; height: 100%; width: 100%; overflow-y: auto;
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #f3f4f6; animation: fadeIn 0.3s ease-in-out;
        }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #drawer { transition: transform 0.3s ease-in-out; transform: translateX(-100%); }
        #drawer.open { transform: translateX(0); }
        #drawerOverlay { transition: opacity 0.3s; opacity: 0; pointer-events: none; }
        #drawerOverlay.open { opacity: 1; pointer-events: auto; }
        .content-with-header { padding-top: 60px; height: 100vh; }
        img { text-indent: -10000px; }
        img:after { content: attr(alt); display: block; font-size: 12px; color: #666; text-align: center; padding: 10px; }
    </style>
</head>
<body class="relative h-screen w-screen overflow-hidden bg-gray-50 text-gray-800">

    <!-- 1. SPLASH SCREEN -->
    <div id="splashScreen" class="screen active bg-blue-600 flex flex-col items-center justify-center text-white z-50">
        <div class="w-32 h-32 bg-white rounded-2xl p-2 shadow-2xl mb-8 animate-bounce">
            <img src="/static/file_00000000bc747207aec7c53bb87ed146.png" alt="Logo" class="w-full h-full object-contain rounded-xl" onerror="this.src='https://placehold.co/150x150/ffffff/2563eb?text=Logo';">
        </div>
        <h1 class="text-4xl font-extrabold mb-2 tracking-wide text-center">Polytechnic Hub</h1>
        <p class="text-blue-200 text-lg mb-12 text-center">Your Ultimate Diploma Companion</p>
        <p id="loadingText" class="text-white text-sm font-semibold bg-black bg-opacity-50 px-4 py-2 rounded-full animate-pulse">Connecting to Server...</p>
    </div>

    <!-- MAIN APP WRAPPER -->
    <div id="mainApp" class="hidden h-full w-full">
        <!-- HEADER -->
        <header class="absolute top-0 w-full h-[60px] bg-blue-600 text-white shadow-md z-40 flex items-center justify-between px-4">
            <div class="flex items-center">
                <button id="menuBtn" onclick="toggleDrawer()" class="p-2 -ml-2 rounded-full hover:bg-blue-700 transition-colors">
                    <i class="ph ph-list text-2xl"></i>
                </button>
                <button id="backBtn" onclick="goBack()" class="hidden p-2 -ml-2 rounded-full hover:bg-blue-700 transition-colors">
                    <i class="ph ph-caret-left text-2xl"></i>
                </button>
                <h1 id="headerTitle" class="text-lg font-bold ml-2 flex items-center gap-2">Polytechnic Hub</h1>
            </div>
        </header>

        <!-- DRAWER (Side Menu) -->
        <div id="drawerOverlay" class="fixed inset-0 bg-black/50 z-50" onclick="toggleDrawer()"></div>
        <div id="drawer" class="fixed top-0 left-0 bottom-0 w-64 bg-white shadow-xl z-50 flex flex-col">
            <div class="bg-blue-600 p-6 flex flex-col items-center text-white">
                <div class="w-20 h-20 bg-white rounded-full p-1 overflow-hidden mb-3 shadow-md">
                    <img src="/static/file_00000000bc747207aec7c53bb87ed146.png" class="w-full h-full object-cover rounded-full" onerror="this.src='https://placehold.co/100/ffffff/2563eb?text=Logo'">
                </div>
                <h2 class="text-xl font-bold">Polytechnic Hub</h2>
            </div>
            <div class="flex-1 p-2 space-y-1">
                <button onclick="navigateTo('homeScreen', 'Polytechnic Hub'); toggleDrawer();" class="w-full flex items-center p-3 rounded-lg hover:bg-blue-50 text-gray-700 font-medium">
                    <i class="ph ph-house text-xl mr-3 text-blue-600"></i> Home
                </button>
                <button onclick="navigateTo('aboutScreen', 'About Developer'); toggleDrawer();" class="w-full flex items-center p-3 rounded-lg hover:bg-blue-50 text-gray-700 font-medium">
                    <i class="ph ph-info text-xl mr-3 text-blue-600"></i> About Developer
                </button>
            </div>
        </div>

        <!-- 2. HOME SCREEN -->
        <div id="homeScreen" class="screen content-with-header bg-white">
            <div class="w-full h-40 bg-gray-200 relative overflow-hidden">
                <img src="/static/1781781254073.png" alt="Banner" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/600x200/2563eb/ffffff?text=Welcome'">
                <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex items-end p-4">
                    <h2 class="text-white text-lg font-bold">Select Semester</h2>
                </div>
            </div>
            <div class="p-4 grid grid-cols-2 gap-4 max-w-lg mx-auto pb-8" id="semesterGrid"></div>
        </div>

        <!-- 3. BRANCH SCREEN -->
        <div id="branchScreen" class="screen content-with-header bg-gray-50">
            <div class="p-4 max-w-lg mx-auto pb-8">
                <div id="branchContext" class="mb-4 text-sm font-medium text-gray-500 bg-white p-3 rounded-lg shadow-sm border border-gray-100"></div>
                <h2 class="text-xl font-bold mb-4 text-gray-800 px-1">Choose Branch</h2>
                <div id="branchList" class="flex flex-col gap-3"></div>
            </div>
        </div>

        <!-- 4. SUBJECT SCREEN -->
        <div id="subjectScreen" class="screen content-with-header bg-gray-50">
            <div class="p-4 max-w-lg mx-auto pb-8">
                <div id="subjectContext" class="mb-4 text-xs font-medium text-gray-500 bg-white p-3 rounded-lg shadow-sm border border-gray-100 flex items-center flex-wrap gap-1"></div>
                <h2 class="text-xl font-bold mb-4 text-gray-800 px-1">Select Subject</h2>
                <div id="subjectList" class="flex flex-col gap-3"></div>
            </div>
        </div>

        <!-- 5. CONTENT SCREEN -->
        <div id="contentScreen" class="screen bg-gray-50 flex flex-col h-full pt-[60px]">
            <div id="contentContext" class="bg-gray-800 text-white p-2 px-4 text-xs shadow-inner flex items-center whitespace-nowrap overflow-x-auto no-scrollbar"></div>
            <div class="flex bg-white shadow-sm shrink-0">
                <button onclick="switchTab('video')" id="tabVideo" class="flex-1 py-3 flex items-center justify-center font-bold text-blue-600 border-b-4 border-blue-600 bg-blue-50 transition-colors">
                    <i class="ph-fill ph-video-camera text-xl mr-2"></i> Videos
                </button>
                <button onclick="switchTab('pdf')" id="tabPdf" class="flex-1 py-3 flex items-center justify-center font-bold text-gray-500 hover:bg-gray-50 transition-colors">
                    <i class="ph-fill ph-file-pdf text-xl mr-2"></i> PDFs
                </button>
            </div>
            <div class="flex-1 overflow-y-auto p-4">
                <div id="videoContainer" class="max-w-lg mx-auto space-y-4"></div>
                <div id="pdfContainer" class="hidden max-w-lg mx-auto space-y-4"></div>
            </div>
        </div>

        <!-- 6. ABOUT SCREEN -->
        <div id="aboutScreen" class="screen content-with-header bg-white">
            <div class="p-6 max-w-lg mx-auto text-center">
                <div class="w-32 h-32 mx-auto rounded-full overflow-hidden border-4 border-blue-100 mb-4 shadow-lg bg-gray-100">
                    <img src="/static/IMG_20260614_132123.jpg" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/200/cccccc/ffffff?text=Developer'">
                </div>
                <h3 class="text-2xl font-bold text-gray-800">Admin / Developer</h3>
                <p class="text-blue-600 font-medium text-sm mb-4">Founder, Polytechnic Hub</p>
                <div class="text-left bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden mt-8">
                    <div class="bg-blue-600 p-3 text-white flex items-center justify-center gap-2">
                        <i class="ph-fill ph-book-open text-xl"></i><h3 class="font-bold">AI Resource Book</h3>
                    </div>
                    <div class="p-4">
                        <img src="/static/Screenshot_2026-06-19-20-54-44-00_b5a5c5cb02ca09c784c5d88160e2ec24.jpg" class="w-full rounded-lg" onerror="this.src='https://placehold.co/400x600/f3f4f6/a1a1aa?text=AI+Book'">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State to hold data fetched from Python Backend
        let appData = {};
        let state = { currentScreen: 'homeScreen', history: [], selectedSem: null, selectedBranch: null, selectedSubject: null, activeTab: 'video' };

        document.addEventListener('DOMContentLoaded', () => {
            // 1. CONNECT TO PYTHON BACKEND API
            document.getElementById('loadingText').innerText = "Fetching Data from Python...";
            
            fetch('/api/get_data')
                .then(response => response.json())
                .then(data => {
                    appData = data; // Save the Python data
                    
                    // Show home screen after data is ready
                    setTimeout(() => {
                        document.getElementById('splashScreen').classList.remove('active');
                        document.getElementById('mainApp').classList.remove('hidden');
                        initHomeScreen();
                    }, 1000);
                })
                .catch(error => {
                    console.error("Error fetching data:", error);
                    document.getElementById('loadingText').innerText = "Error connecting to server!";
                    document.getElementById('loadingText').classList.replace('bg-black', 'bg-red-600');
                });
        });

        // Navigation Logic
        function navigateTo(screenId, title, addToHistory = true) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            
            document.getElementById('headerTitle').innerHTML = screenId === 'homeScreen' ? 
                `<img src="/static/file_00000000bc747207aec7c53bb87ed146.png" class="w-6 h-6 rounded-full bg-white object-cover" onerror="this.style.display='none'"> ${title}` : title;
            
            if (screenId === 'homeScreen') {
                document.getElementById('menuBtn').classList.remove('hidden');
                document.getElementById('backBtn').classList.add('hidden');
                state.history = [];
            } else {
                document.getElementById('menuBtn').classList.add('hidden');
                document.getElementById('backBtn').classList.remove('hidden');
                if (addToHistory) state.history.push(state.currentScreen);
            }
            state.currentScreen = screenId;
        }

        function goBack() {
            if (state.history.length > 0) {
                const prevScreen = state.history.pop();
                let title = "Polytechnic Hub";
                if (prevScreen === 'branchScreen') title = "Choose Branch";
                else if (prevScreen === 'subjectScreen') title = "Subjects";
                navigateTo(prevScreen, title, false);
            } else {
                navigateTo('homeScreen', 'Polytechnic Hub', false);
            }
        }

        function toggleDrawer() {
            document.getElementById('drawer').classList.toggle('open');
            document.getElementById('drawerOverlay').classList.toggle('open');
        }

        // Render Data dynamically from Python API
        function initHomeScreen() {
            const container = document.getElementById('semesterGrid');
            container.innerHTML = '';
            appData.semesters.forEach(sem => {
                const btn = document.createElement('button');
                btn.className = "bg-white rounded-xl shadow-sm p-6 border-b-4 border-blue-600 hover:bg-blue-50 transition-all flex flex-col items-center gap-3";
                btn.innerHTML = `<div class="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center text-blue-600"><i class="ph-fill ph-student text-2xl"></i></div><span class="font-bold text-gray-800">Semester ${sem}</span>`;
                btn.onclick = () => { state.selectedSem = sem; initBranchScreen(); };
                container.appendChild(btn);
            });
            navigateTo('homeScreen', 'Polytechnic Hub');
        }

        function initBranchScreen() {
            document.getElementById('branchContext').innerHTML = `Selected: <span class="text-blue-600 font-bold">Semester ${state.selectedSem}</span>`;
            const container = document.getElementById('branchList');
            container.innerHTML = '';
            appData.branches.forEach(branch => {
                const btn = document.createElement('button');
                btn.className = "flex items-center justify-between bg-white p-4 rounded-xl shadow-sm border border-gray-100 hover:border-blue-400 text-left";
                btn.innerHTML = `<span class="font-bold text-gray-700">${branch}</span><i class="ph-bold ph-caret-right text-gray-400"></i>`;
                btn.onclick = () => { state.selectedBranch = branch; initSubjectScreen(); };
                container.appendChild(btn);
            });
            navigateTo('branchScreen', 'Choose Branch');
        }

        function initSubjectScreen() {
            document.getElementById('subjectContext').innerHTML = `Sem ${state.selectedSem} <i class="ph-bold ph-caret-right mx-1"></i> <span class="text-blue-600 font-bold">${state.selectedBranch}</span>`;
            const container = document.getElementById('subjectList');
            container.innerHTML = '';
            
            const subjects = appData.subjects[state.selectedSem] || appData.subjects["default"];
            subjects.forEach(sub => {
                const btn = document.createElement('button');
                btn.className = "flex items-center p-4 bg-white rounded-xl shadow-sm border-l-4 border-blue-500 text-left";
                btn.innerHTML = `<div class="bg-blue-100 p-3 rounded-lg mr-4"><i class="ph-fill ph-book-open text-blue-600 text-xl"></i></div><div class="flex-1"><h3 class="font-bold text-gray-800 text-lg mb-1">${sub}</h3><p class="text-xs text-gray-500">Videos & PDFs</p></div><i class="ph-bold ph-caret-right text-gray-300"></i>`;
                btn.onclick = () => { state.selectedSubject = sub; initContentScreen(); };
                container.appendChild(btn);
            });
            navigateTo('subjectScreen', 'Subjects');
        }

        function initContentScreen() {
            document.getElementById('contentContext').innerHTML = `Sem ${state.selectedSem} > ${state.selectedBranch.split(' ')[0]} > <span class="font-bold text-blue-300 ml-1 truncate">${state.selectedSubject}</span>`;

            // Load Videos from Python Data
            const videoContainer = document.getElementById('videoContainer');
            videoContainer.innerHTML = '';
            appData.content.videos.forEach(v => {
                videoContainer.innerHTML += `
                    <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-200">
                        <div class="w-full h-44 bg-gray-900 relative flex items-center justify-center cursor-pointer">
                            <div class="absolute inset-0 bg-blue-900 opacity-50"></div>
                            <img src="https://placehold.co/400x200/1e3a8a/ffffff?text=${state.selectedSubject.replace(/ /g, '+')}" class="w-full h-full object-cover opacity-80" alt="Thumb">
                            <i class="ph-fill ph-play-circle absolute text-5xl text-white opacity-90 drop-shadow-lg"></i>
                        </div>
                        <div class="p-4">
                            <h3 class="font-bold text-gray-800 mb-1 leading-tight">Lec ${v.id}: ${v.title}</h3>
                            <div class="flex justify-between items-center mt-2">
                                <p class="text-xs font-medium text-gray-500">By ${appData.app_info.developer}</p>
                                <span class="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded-md">${v.duration}</span>
                            </div>
                        </div>
                    </div>`;
            });

            // Load PDFs from Python Data
            const pdfContainer = document.getElementById('pdfContainer');
            pdfContainer.innerHTML = '';
            appData.content.pdfs.forEach(p => {
                pdfContainer.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex items-center cursor-pointer">
                        <div class="bg-red-50 border border-red-100 p-3 rounded-lg mr-4">
                            <i class="ph-fill ph-file-pdf text-2xl text-red-500"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <h3 class="font-bold text-gray-800 text-sm mb-1 truncate">${p.title}</h3>
                            <p class="text-xs text-gray-500">PDF • ${p.size}</p>
                        </div>
                        <button class="p-2 ml-2 bg-gray-100 rounded-full text-gray-600"><i class="ph-bold ph-download-simple text-lg"></i></button>
                    </div>`;
            });

            switchTab('video');
            navigateTo('contentScreen', 'Materials');
        }

        function switchTab(tab) {
            state.activeTab = tab;
            const tv = document.getElementById('tabVideo'), tp = document.getElementById('tabPdf');
            const vc = document.getElementById('videoContainer'), pc = document.getElementById('pdfContainer');

            if (tab === 'video') {
                tv.className = "flex-1 py-3 flex items-center justify-center font-bold text-blue-600 border-b-4 border-blue-600 bg-blue-50";
                tp.className = "flex-1 py-3 flex items-center justify-center font-bold text-gray-500 border-b-4 border-transparent";
                vc.classList.remove('hidden'); pc.classList.add('hidden');
            } else {
                tp.className = "flex-1 py-3 flex items-center justify-center font-bold text-red-600 border-b-4 border-red-600 bg-red-50";
                tv.className = "flex-1 py-3 flex items-center justify-center font-bold text-gray-500 border-b-4 border-transparent";
                pc.classList.remove('hidden'); vc.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
